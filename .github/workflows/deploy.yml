# ============================================================
# KeyVaultX — Deploy Pipeline (Staging → Production)
# ============================================================
# Deploys to staging on develop push, to production on main push
# Requires all security tests to pass first
# ============================================================

name: Deploy

on:
  push:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── DEPLOY TO STAGING ────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to staging server
        run: |
          echo "🚀 Deploying to staging..."
          # Replace with your deployment command:
          # ssh deploy@staging.keyvaultx.io "docker pull $IMAGE && docker-compose up -d"
          echo "✅ Staging deployment complete"

      - name: Run smoke tests
        run: |
          echo "🔍 Running staging smoke tests..."
          # curl -f https://staging.keyvaultx.io/health || exit 1
          echo "✅ Health check passed"

  # ─── DEPLOY TO PRODUCTION ─────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Run database migrations
        run: |
          echo "🗄️ Running production migrations..."
          # npx prisma migrate deploy
          echo "✅ Migrations applied"

      - name: Deploy to production
        run: |
          echo "🚀 Deploying to production..."
          # Replace with your deployment command
          echo "✅ Production deployment complete"

      - name: Post-deploy health check
        run: |
          echo "🔍 Verifying production health..."
          # curl -f https://api.keyvaultx.io/health || exit 1
          echo "✅ Production is healthy"

      - name: Notify team
        if: success()
        run: |
          echo "📢 Deployment notification..."
          # curl -X POST $SLACK_WEBHOOK -d '{"text":"KeyVaultX deployed to production: ${{ github.sha }}"}'
