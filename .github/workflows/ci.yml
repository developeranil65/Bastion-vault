name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: keyvaultx_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/keyvaultx_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-jwt-secret
      JWT_REFRESH_SECRET: ci-test-refresh-secret
      ENCRYPTION_MASTER_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/api

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: apps/api

      - name: Push database schema
        run: npx prisma db push --skip-generate
        working-directory: apps/api

      - name: TypeScript Build
        run: npx tsc --noEmit
        working-directory: apps/api

      - name: Run Tests
        run: npm run test
        working-directory: apps/api

  startup-integration:
    name: Docker Startup Integration
    runs-on: ubuntu-latest
    needs: build-and-test

    env:
      API_PORT: 3300
      FRONTEND_PORT: 3301
      POSTGRES_PASSWORD: ci-postgres-password-strong
      REDIS_PASSWORD: ci-redis-password-strong
      JWT_SECRET: ci-jwt-secret-super-long-value
      JWT_REFRESH_SECRET: ci-refresh-secret-super-long-value
      ENCRYPTION_MASTER_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

    steps:
      - uses: actions/checkout@v4

      - name: Start stack with fresh volumes
        run: |
          docker compose -f docker/compose.yml down -v || true
          docker compose -f docker/compose.yml up -d --build

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -fsS "http://localhost:${API_PORT}/health" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          docker compose -f docker/compose.yml ps
          docker logs docker-api-1 || true
          exit 1

      - name: Verify schema-dependent endpoint on fresh DB
        run: |
          EMAIL="ci-startup-$RANDOM@example.com"
          RESPONSE=$(curl -fsS -X POST "http://localhost:${API_PORT}/api/v1/auth/register" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"${EMAIL}\",\"password\":\"StrongPass!123\",\"tenantName\":\"CI Startup\"}")
          echo "$RESPONSE" | grep -q "\"success\":true"

      - name: Print container status
        if: always()
        run: |
          docker compose -f docker/compose.yml ps
          docker logs docker-api-1 --tail 100 || true

      - name: Tear down stack
        if: always()
        run: docker compose -f docker/compose.yml down -v
